<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sole Store</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}

/* ── LAYOUT ─────────────────────────── */
.page{display:flex;height:100vh;width:100vw}

/* LEFT – brand panel */
.left{
  width:45%;min-width:340px;
  background:linear-gradient(150deg,#0D3340 0%,#0a2535 60%,#071a25 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 48px;position:relative;overflow:hidden;
  animation:slideLeft .7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}

/* grid overlay */
.left::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(184,194,216,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(184,194,216,.04) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;
}
/* glow orb */
.left::after{
  content:'';position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(107,122,159,.18) 0%,transparent 70%);
  top:-80px;right:-80px;pointer-events:none;
}

.brand-panel{position:relative;z-index:2;text-align:center;animation:fadeUp .8s .3s both}
.brand-logo{
  width:92px;height:92px;
  background:#E9ECF4;
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  padding:10px;
  margin:0 auto 32px;
  box-shadow:0 16px 40px rgba(0,0,0,.4),0 0 0 1.5px rgba(184,194,216,.3);
  animation:logoFloat 5s ease-in-out 1s infinite;
  overflow:hidden;
}
.brand-logo img{
  width:140%;
  height:140%;
  object-fit:contain;
  display:block;
  border-radius:10px;
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.brand-name{
  font-family:'DM Serif Display',serif;
  font-size:42px;color:#F2F3F7;letter-spacing:-1px;margin-bottom:12px;
  text-shadow:0 0 60px rgba(184,194,216,.15);
}
.brand-tag{
  font-size:11px;font-weight:600;letter-spacing:3.5px;
  text-transform:uppercase;color:rgba(184,194,216,.55);margin-bottom:44px;
}

.feature-list{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px}
.feature{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(184,194,216,.12);
  border-radius:12px;
  color:rgba(184,194,216,.75);font-size:13px;font-weight:500;
  backdrop-filter:blur(8px);
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both;
}
.feature:nth-child(1){animation-delay:.4s}
.feature:nth-child(2){animation-delay:.5s}
.feature:nth-child(3){animation-delay:.6s}
.feature-icon{font-size:20px;flex-shrink:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* RIGHT – form panel */
.right{
  flex:1;background:#E9ECF4;
  display:flex;align-items:center;justify-content:center;
  padding:40px 32px;overflow-y:auto;
  position:relative;
}
.right::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 70% 20%,rgba(13,51,64,.05) 0%,transparent 40%),
    radial-gradient(circle at 30% 80%,rgba(107,122,159,.07) 0%,transparent 40%);
  pointer-events:none;z-index:0;
}

/* card */
.auth-card{
  position:relative;z-index:1;
  background:#F2F3F7;
  border:1.5px solid #D0D6E8;
  border-radius:24px;
  width:100%;max-width:420px;
  padding:48px 44px;
  box-shadow:0 20px 60px rgba(13,51,64,.12),0 4px 16px rgba(13,51,64,.06);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) .1s both;
  overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#B8C2D8,#6B7A9F,#0D3340);
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* tabs */
.tabs{display:flex;gap:0;margin-bottom:36px;border-radius:12px;overflow:hidden;border:1.5px solid #D0D6E8}
.tab{
  flex:1;padding:13px;border:none;background:transparent;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.5px;color:#6B7A9F;
  transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;
}
.tab.active{background:#0D3340;color:#F2F3F7}
.tab:not(.active):hover{background:#E9ECF4;color:#0D3340}

/* form panels */
.form-panel{display:none;animation:panelIn .4s cubic-bezier(.16,1,.3,1)}
.form-panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.form-title{font-family:'DM Serif Display',serif;font-size:28px;color:#0D3340;margin-bottom:6px}
.form-sub{font-size:13px;color:#6B7A9F;margin-bottom:28px}

/* fields */
.field{margin-bottom:20px}
.field label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;color:#6B7A9F;margin-bottom:8px;
  transition:color .2s;
}
.field:focus-within label{color:#0D3340}
.field input{
  width:100%;padding:14px 18px;
  background:#E9ECF4;border:1.5px solid #D0D6E8;border-radius:12px;
  color:#1A1A22;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:500;outline:none;
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.field input:focus{border-color:#0D3340;background:#fff;box-shadow:0 0 0 4px rgba(13,51,64,.08)}
.field input::placeholder{color:#B8C2D8;font-weight:400}

/* error/success messages */
.msg{
  padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;
  margin-bottom:18px;display:none;animation:msgIn .3s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.msg.error{background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626;display:block}
.msg.success{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#16a34a;display:block}

/* submit button */
.submit-btn{
  width:100%;margin-top:8px;border:none;border-radius:14px;cursor:pointer;
  background:#0D3340;position:relative;overflow:hidden;
  transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s;
  box-shadow:0 8px 28px rgba(13,51,64,.3);
}
.submit-btn span{
  display:block;padding:16px;color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  transition:transform .25s cubic-bezier(.22,1,.36,1);
}
.submit-btn:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(13,51,64,.4)}
.submit-btn:hover span{transform:translateY(-2px)}
.submit-btn:active{transform:translateY(4px)}
.submit-btn:active span {transform: translateY(1px) scale(0.97);}
.submit-btn::after{
  content:'';position:absolute;top:0;left:-130%;width:65%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
  transform:skewX(-20deg);pointer-events:none;
}
.submit-btn:hover::after{animation:sweep .9s ease}
@keyframes sweep{from{left:-130%}to{left:150%}}

/* divider */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:#B8C2D8;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#D0D6E8}

/* loading state */
.submit-btn.loading span::after{content:'…'}

/* responsive */
@media(max-width:720px){
  .left{display:none}
  .right{justify-content:center}
  .auth-card{padding:36px 28px}
}
</style>
</head>
<body>
<div class="page">

  <!-- ── LEFT PANEL ── -->
  <div class="left">
    <div class="brand-panel">
      <div class="brand-logo"><img src="logo.svg" alt="Sole Logo"></div>
      <div class="brand-name">Sole Store</div>
      <div class="brand-tag">Premium Footwear Catalog</div>
      <div class="feature-list">
        <div class="feature"><span class="feature-icon">🛍️</span>Browse the full collection</div>
        <div class="feature"><span class="feature-icon">🔒</span>Secure admin management</div>
        <div class="feature"><span class="feature-icon">⚡</span>Real-time product updates</div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">
    <div class="auth-card">

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="panelLogin">
        <div class="form-title">Welcome back</div>
        <div class="form-sub">Sign in to your account to continue</div>
        <div class="msg" id="loginMsg"></div>
        <div class="field">
          <label>Username</label>
          <input id="loginUser" type="text" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button class="submit-btn" id="loginBtn" onclick="doLogin()">
          <span>Sign In →</span>
        </button>
        <div class="divider">or</div>
        <div style="text-align:center;font-size:13px;color:#6B7A9F">
          No account? <a href="#" onclick="switchTab('signup')" style="color:#0D3340;font-weight:700;text-decoration:none">Create one →</a>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-panel" id="panelSignup">
        <div class="form-title">Create account</div>
        <div class="form-sub">Join Sole Store as a client today</div>
        <div class="msg" id="signupMsg"></div>
        <div class="field">
          <label>Username</label>
          <input id="signupUser" type="text" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="signupPass" type="password" placeholder="Choose a password" autocomplete="new-password">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input id="signupConfirm" type="password" placeholder="Repeat your password" autocomplete="new-password">
        </div>
        <button class="submit-btn" id="signupBtn" onclick="doSignup()">
          <span>Create Account →</span>
        </button>
        <div class="divider">or</div>
        <div style="text-align:center;font-size:13px;color:#6B7A9F">
          Have an account? <a href="#" onclick="switchTab('login')" style="color:#0D3340;font-weight:700;text-decoration:none">Sign in →</a>
        </div>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /right -->
</div><!-- /page -->

<script>
const API = window.location.origin;

// Redirect if already logged in
const saved = localStorage.getItem('sole_user');
if(saved){
  const u = JSON.parse(saved);
  location.href = u.role === 'admin' ? 'admin.html' : 'client-welcome.html';
}

function switchTab(tab){
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('panelLogin').classList.toggle('active', tab==='login');
  document.getElementById('panelSignup').classList.toggle('active', tab==='signup');
  // re-trigger animation
  const panel = document.getElementById(tab==='login'?'panelLogin':'panelSignup');
  panel.style.animation='none';
  requestAnimationFrame(()=>{ panel.style.animation=''; });
}

function showMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(btnId, loading){
  document.getElementById(btnId).classList.toggle('loading', loading);
  document.getElementById(btnId).disabled = loading;
}

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  if(!username || !password){ showMsg('loginMsg','Please fill in all fields','error'); return; }

  setLoading('loginBtn', true);
  try{
    const res  = await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await res.json();
    if(res.ok){
      localStorage.setItem('sole_user', JSON.stringify(data.user));
      showMsg('loginMsg','Welcome back! Redirecting…','success');
      setTimeout(()=>{ location.href = data.user.role==='admin' ? 'admin.html' : 'client-welcome.html'; }, 800);
    } else {
      showMsg('loginMsg', data.error || 'Login failed', 'error');
    }
  } catch(e){
    showMsg('loginMsg','Cannot reach server. Is the backend running?','error');
  }
  setLoading('loginBtn', false);
}

async function doSignup(){
  const username = document.getElementById('signupUser').value.trim();
  const password = document.getElementById('signupPass').value.trim();
  const confirm  = document.getElementById('signupConfirm').value.trim();
  if(!username || !password || !confirm){ showMsg('signupMsg','Please fill in all fields','error'); return; }
  if(password !== confirm){ showMsg('signupMsg','Passwords do not match','error'); return; }
  if(password.length < 4){ showMsg('signupMsg','Password must be at least 4 characters','error'); return; }

  setLoading('signupBtn', true);
  try{
    const res  = await fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await res.json();
    if(res.ok){
      showMsg('signupMsg','Account created! Switching to login…','success');
      setTimeout(()=>switchTab('login'), 1200);
    } else {
      showMsg('signupMsg', data.error || 'Registration failed', 'error');
    }
  } catch(e){
    showMsg('signupMsg','Cannot reach server. Is the backend running?','error');
  }
  setLoading('signupBtn', false);
}

// Enter key support
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const lActive = document.getElementById('panelLogin').classList.contains('active');
    lActive ? doLogin() : doSignup();
  }
});
</script>
</body>
</html>
